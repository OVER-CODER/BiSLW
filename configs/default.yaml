# ==============================================================================
# Bi-Spectral Latent Watermarking (BiSLW) - Default Configuration & Technical Bible
# ==============================================================================
# This configuration file specifies the parameters used during model training,
# latent watermark injection, and evaluation, aligned with the BiSLW paper.
# ==============================================================================

# ------------------------------------------------------------------------------
# A. Hyperparameters
# ------------------------------------------------------------------------------
optimizer: 'AdamW'         # Optimization algorithm for weight updates
lr: 6.0e-5                 # Base learning rate (\eta) for AdamW optimizer
batch_size: 8              # Mini-batch size per optimization step
epochs: 40                 # Total training epochs for network convergence
grad_clip: 1.0             # Gradient clipping threshold to prevent explosion

# ------------------------------------------------------------------------------
# B. Spectral Parameters (Bi-Spectral Injection)
# ------------------------------------------------------------------------------
latent_split: 'dct'        # Spectral decomposition mode ('dct' or 'learned')
mask_radius: 0.25          # Radius (r = 0.25) defining the low-frequency quadrant boundary
alpha_l: 0.8               # Low-frequency band embedding strength (\alpha_L)
alpha_h: 0.3               # High-frequency band embedding strength (\alpha_H)

# ------------------------------------------------------------------------------
# C. Loss Function Weights
# ------------------------------------------------------------------------------
# Total Loss is formulated as:
# L_total = \lambda_w * L_w + \lambda_cons * L_cons + \lambda_z * L_z + \lambda_rob * L_rob
# ------------------------------------------------------------------------------
lambda_w: 1.0              # Watermark recovery weight (\lambda_w)
                           # L_w = ||\hat{w}_L - w||_2^2 + ||\hat{w}_H - w||_2^2

lambda_cons: 0.5           # Cross-band consistency weight (\lambda_cons)
                           # L_cons = ||\hat{w}_L - \hat{w}_H||_2^2

lambda_latent: 2.0         # Latent space preservation weight (\lambda_z)
                           # L_z = ||\tilde{z} - z||_2^2

lambda_robust: 1.0         # Robustness recovery weight (\lambda_rob)
                           # L_rob = E_{A}[||\hat{w}_L^A - w||_2^2 + ||\hat{w}_H^A - w||_2^2]

lambda_perceptual: 0.0     # Perceptual (VGG) loss weight; set to 0.0 to conserve VRAM

# ------------------------------------------------------------------------------
# D. Dataset Settings
# ------------------------------------------------------------------------------
image_size: 256            # Spatial resolution of training images (256x256 pixels)
num_train_images: 10000    # Total subset size of MIRFLICKR used for training
w_dim: 32                  # Message length (dimension of binary signature vector)

# ------------------------------------------------------------------------------
# E. Attack Simulation Settings (Active during Robustness Training)
# ------------------------------------------------------------------------------
# Supported differentiable attack approximations in training pipeline:
# - JPEG: Simulated JPEG compression via differentiable JPEG approximations
# - Noise: Additive zero-mean Gaussian noise (\sigma^2 \in [0.01, 0.05])
# - Blur: Gaussian kernel blur approximation (kernel_size \in [3, 5])
# - Crop: Center and random cropping (10% spatial exclusion)
# - Rotation: Bilinear spatial rotation (up to 10 degrees)
# - Resize: Spatial bilinear downsampling/upsampling (scale ratio 0.5x to 1.5x)
# - Brightness/Contrast: Intensity scaling and offset perturbations

# ------------------------------------------------------------------------------
# F. Model Settings
# ------------------------------------------------------------------------------
model_id: 'runwayml/stable-diffusion-v1-5'  # Pretrained VAE model identifier
latent_channels: 4                         # Channels in VAE latent space (z \in R^{4x32x32})
hidden_dim: 32                             # Channels in watermark encoder/decoder layers
# Note: Decoder utilizes Feature-wise Linear Modulation (FiLM) layers to condition 
# extraction networks on the target frequency band indicators.

# ------------------------------------------------------------------------------
# G. Runtime & Path Settings
# ------------------------------------------------------------------------------
device: 'mps'                              # Hardware device targeting ('mps', 'cuda', or 'cpu')
num_workers: 0                             # DataLoader worker count (0 for macOS stability)
checkpoint_dir: 'checkpoints'              # Output path for training checkpoints
results_dir: 'results'                     # Directory for evaluation figures and stats
eval_batch_size: 8                         # Mini-batch size for validation steps
eval_interval: 5                           # Epoch interval to run validation
save_interval: 5                           # Epoch interval to save checkpoint
target_psnr: 37.40                         # Aligned paper target PSNR (dB)
target_ssim: 0.91                          # Aligned paper target SSIM
